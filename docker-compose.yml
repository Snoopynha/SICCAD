services:
  db:
    image: postgres:15
    container_name: forense-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  api:
    build: ./api
    container_name: forense-api
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - ledger_volume:/app/shared_data

  monitor:
    build: ./monitor
    container_name: forense-monitor
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DB: ${POSTGRES_DB}
      DB_HOST: db
      DB_PORT: 5432
      JAVA_API_URL: http://forense-api:8080/api/notificacoes
    ports:
      - "8000:8000"
    depends_on:
      - db
      - api
    volumes:
      - ledger_volume:/app/shared_data

volumes:
  postgres_data:
  ledger_volume: